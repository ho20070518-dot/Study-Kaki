<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>StudyKaki - My Profile</title>
    <link href="https://fonts.googleapis.com/css2?family=Outfit:wght@400;600;700&display=swap" rel="stylesheet">
    <style>
        * { box-sizing: border-box; margin: 0; padding: 0; }
        
        body {
            font-family: 'Outfit', sans-serif;
            background-color: #fafaf9;
            /* 风格：点阵手账背景 */
            background-image: radial-gradient(#d1d5db 2px, transparent 2px);
            background-size: 30px 30px;
            min-height: 100vh;
            padding: 40px 20px;
        }

        /* 顶部导航栏 */
        .navbar {
            max-width: 600px;
            margin: 0 auto 30px auto;
            display: flex;
            justify-content: space-between;
            align-items: center;
        }

        .navbar h1 {
            font-size: 24px;
            color: #111;
            font-weight: 700;
        }

        .btn-nav {
            padding: 10px 20px;
            background: #fff;
            color: #111;
            text-decoration: none;
            font-weight: 600;
            border: 2px solid #111;
            border-radius: 12px;
            box-shadow: 3px 3px 0px #111;
            transition: all 0.2s;
        }

        .btn-nav:hover {
            transform: translate(2px, 2px);
            box-shadow: 1px 1px 0px #111;
        }

        /* 个人信息卡片 */
        .profile-card {
            background: #ffffff;
            padding: 40px;
            max-width: 600px;
            margin: 0 auto;
            border-radius: 30px; 
            border: 3px solid #111111;
            /* 风格：专属的活力黄阴影 */
            box-shadow: 12px 12px 0px #fef08a, 12px 12px 0px 3px #111111;
        }

        /* 头像区域 */
        .avatar-section {
            display: flex;
            align-items: center;
            gap: 20px;
            margin-bottom: 30px;
            padding-bottom: 30px;
            border-bottom: 2px dashed #e5e7eb;
        }

        .avatar {
            width: 100px;
            height: 100px;
            background: #fde047; /* 活力黄 */
            border: 3px solid #111;
            border-radius: 50%;
            display: flex;
            justify-content: center;
            align-items: center;
            font-size: 40px;
            font-weight: 700;
            box-shadow: 4px 4px 0px #111;
        }

        .user-title h2 { font-size: 28px; margin-bottom: 5px; }
        .user-title p { color: #666; font-weight: 600; font-size: 16px; }

        /* 信息展示区 */
        .info-group {
            margin-bottom: 25px;
        }

        .info-group label {
            display: block;
            font-size: 14px;
            font-weight: 700;
            color: #9ca3af;
            text-transform: uppercase;
            letter-spacing: 1px;
            margin-bottom: 8px;
        }

        .info-box {
            width: 100%;
            padding: 15px 20px;
            background-color: #f8f9fa;
            border: 2px solid #111;
            border-radius: 15px;
            font-size: 16px;
            font-weight: 600;
            color: #111;
        }

        .btn-edit {
            width: 100%;
            padding: 16px;
            margin-top: 20px;
            background: #111;
            color: #fff;
            font-size: 18px;
            font-weight: 700;
            cursor: pointer;
            border: 3px solid #111;
            border-radius: 20px;
            box-shadow: 4px 4px 0px #fde047;
            transition: all 0.2s;
        }

        .btn-edit:hover {
            background: #333;
            transform: translate(2px, 2px);
            box-shadow: 2px 2px 0px #fde047;
        }
    </style>
</head>
<body>

    <div class="navbar">
        <h1>StudyKaki.</h1>
        <a href="{{ url_for('dashboard') }}" class="btn-nav">Back to Dashboard</a>
    </div>

    <div class="profile-card">
        
        <div class="avatar-section">
            <div class="avatar">{{ user_data.name[0] }}</div>
            <div class="user-title">
                <h2>{{ user_data.name }}</h2>
                <p>Student ID: {{ user_data.student_id }}</p>
            </div>
        </div>

        <div class="info-group">
            <label>About Me / Study Goals</label>
            <div class="info-box">
                {{ user_data.bio }}
            </div>
        </div>

        <button class="btn-edit">Edit Profile</button>
    </div>

</body>
</html>
