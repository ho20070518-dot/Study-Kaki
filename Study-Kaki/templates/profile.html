<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>StudyKaki - My Profile</title>
    <link href="https://fonts.googleapis.com/css2?family=Outfit:wght@400;600;700&display=swap" rel="stylesheet">
    <style>
        * { box-sizing: border-box; margin: 0; padding: 0; }
        
        body {
            font-family: 'Outfit', sans-serif;
            background-color: #fafaf9;
            /* 风格：点阵手账背景 */
            background-image: radial-gradient(#d1d5db 2px, transparent 2px);
            background-size: 30px 30px;
            min-height: 100vh;
            padding: 40px 20px;
        }

        /* 顶部导航栏 */
        .navbar {
            max-width: 600px;
            margin: 0 auto 30px auto;
            display: flex;
            justify-content: space-between;
            align-items: center;
        }

        .navbar h1 {
            font-size: 24px;
            color: #111;
            font-weight: 700;
        }

        .btn-nav {
            padding: 10px 20px;
            background: #fff;
            color: #111;
            text-decoration: none;
            font-weight: 600;
            border: 2px solid #111;
            border-radius: 12px;
            box-shadow: 3px 3px 0px #111;
            transition: all 0.2s;
        }

        .btn-nav:hover {
            transform: translate(2px, 2px);
            box-shadow: 1px 1px 0px #111;
        }

        /* 个人信息卡片 */
        .profile-card {
            background: #ffffff;
            padding: 40px;
            max-width: 600px;
            margin: 0 auto;
            border-radius: 30px; 
            border: 3px solid #111111;
            /* 风格：专属的活力黄阴影 */
            box-shadow: 12px 12px 0px #fef08a, 12px 12px 0px 3px #111111;
        }

        /* 头像区域 */
        .avatar-section {
            display: flex;
            align-items: center;
            gap: 20px;
            margin-bottom: 30px;
            padding-bottom: 30px;
            border-bottom: 2px dashed #e5e7eb;
        }

        .avatar {
            width: 100px;
            height: 100px;
            background: #fde047; /* 活力黄 */
            border: 3px solid #111;
            border-radius: 50%;
            display: flex;
            justify-content: center;
            align-items: center;
            font-size: 40px;
            font-weight: 700;
            box-shadow: 4px 4px 0px #111;
        }

        .user-title h2 { font-size: 28px; margin-bottom: 5px; }
        .user-title p { color: #666; font-weight: 600; font-size: 16px; }

        /* 信息展示区 */
        .info-group {
            margin-bottom: 25px;
        }

        .info-group label {
            display: block;
            font-size: 14px;
            font-weight: 700;
            color: #9ca3af;
            text-transform: uppercase;
            letter-spacing: 1px;
            margin-bottom: 8px;
        }

        .info-box {
            width: 100%;
            padding: 15px 20px;
            background-color: #f8f9fa;
            border: 2px solid #111;
            border-radius: 15px;
            font-size: 16px;
            font-weight: 600;
            color: #111;
        }

        .btn-edit {
            width: 100%;
            padding: 16px;
            margin-top: 20px;
            background: #111;
            color: #fff;
            font-size: 18px;
            font-weight: 700;
            cursor: pointer;
            border: 3px solid #111;
            border-radius: 20px;
            box-shadow: 4px 4px 0px #fde047;
            transition: all 0.2s;
        }

        .btn-edit:hover {
            background: #333;
            transform: translate(2px, 2px);
            box-shadow: 2px 2px 0px #fde047;
        }
    </style>
</head>
<body>
    <!-- 1. 顶部返回键：指向 dashboard 函数 -->
    <div style="text-align: left; margin-bottom: 25px;">
        <a href="{{ url_for('dashboard') }}" style="
            text-decoration: none; 
            color: #111; 
            font-weight: 800; 
            font-size: 0.9rem; 
            display: inline-flex; 
            align-items: center; 
            gap: 8px;
            padding: 8px 15px;
            border: 2px solid #111;
            border-radius: 10px;
            background: #fff;
            box-shadow: 4px 4px 0px #111;
            transition: 0.2s;">
            ← BACK TO DASHBOARD
        </a>
    </div>

<div class="profile-card">
    
    <!-- Header Section (Keep existing) -->
    <div class="avatar-section">
        <div class="avatar">{{ user_data.name[0] }}</div>
        <div class="user-title">
            <h2>{{ user_data.name }}</h2>
            <p>IT & Software Engineering | TP06XXXX</p> # Student details from your profile
        </div>
    </div>

    <!-- 1. Kaki Stats (New Gamified Module) -->
    <div style="display: grid; grid-template-columns: 1fr 1fr; gap: 15px; margin-bottom: 25px;">
        <div class="info-box" style="text-align: center; background: #fff;">
            <label style="margin-bottom: 5px;">🪙 Kaki Coins</label>
            <div style="font-size: 20px; font-weight: 800;">450</div>
        </div>
        <div class="info-box" style="text-align: center; background: #fff;">
            <label style="margin-bottom: 5px;">🔥 Quests Done</label>
            <div style="font-size: 20px; font-weight: 800;">12</div>
        </div>
    </div>

    <!-- 2. About Me (Existing) -->
    <div class="info-group">
        <label>Study Goals & Bio</label>
        <div class="info-box">
            {{ user_data.bio }}
        </div>
    </div>

    <!-- 3. Tech Stack (New Skill Tags) -->
    <div class="info-group">
        <label>Expertise / Tech Stack</label>
        <div style="display: flex; gap: 8px; flex-wrap: wrap; margin-top: 5px;">
            # These tags match your IT background
            <span style="border: 2px solid #111; padding: 4px 12px; border-radius: 8px; font-size: 13px; font-weight: 700; background: #fde047;">Python</span>
            <span style="border: 2px solid #111; padding: 4px 12px; border-radius: 8px; font-size: 13px; font-weight: 700; background: #fff;">SQL</span>
            <span style="border: 2px solid #111; padding: 4px 12px; border-radius: 8px; font-size: 13px; font-weight: 700; background: #fff;">Flask</span>
            <span style="border: 2px solid #111; padding: 4px 12px; border-radius: 8px; font-size: 13px; font-weight: 700; background: #fff;">Backend</span>
        </div>
    </div>

    <!-- 4. Beyond Coding (New Personal Stats) -->
    <div class="info-group">
        <label>Beyond Coding </label>
        <div style="display: grid; grid-template-columns: 1fr 1fr; gap: 10px;">
            <div class="info-box" style="font-size: 14px; padding: 10px;"></div>
            <h></h> 
            <div class="info-box" style="font-size: 14px; padding: 10px;"></div>
        </div>
    </div>

    <!-- 指向 Python 里的 edit_profile 函数 -->
    <a href="{{ url_for('edit_profile') }}" class="btn-edit">Edit Profile</a>
</div>

</body>
</html>
