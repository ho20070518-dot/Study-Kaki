{% extends "base.html" %}

{% block title %}Create Study Session - StudyKaki{% endblock %}

{% block content %}

<link rel="stylesheet" href="{{ url_for('static', filename='css/create_session.css') }}">

<div class="create-page">

    <a href="/dashboard" class="logo-link">
        <div class="logo-text">
            STUDY<span>KAKI</span>
        </div>
    </a>

    <hr class="top-line">

    <h1>Create Study Session</h1>

    <form method="POST" action="{{ url_for('study_session_routes.create_session') }}" class="create-form" onsubmit="combineTimeValues()">

        <div class="form-group">
            <label for="subject">Subject</label>
            <input 
                type="text" 
                id="subject" 
                name="subject" 
                placeholder="Example: Mathematics II"
                required
            >
        </div>

        <div class="form-group">
            <label for="topic">Topic</label>
            <input 
                type="text" 
                id="topic" 
                name="topic" 
                placeholder="Example: Matrix Revision"
                required
            >
        </div>

        <div class="form-row">

            <div class="form-group">
                <label for="session_date">Date</label>
                <input 
                    type="date" 
                    id="session_date" 
                    name="session_date" 
                    required
                >
            </div>

            <div class="form-group">
                <label>Start Time</label>

                <div class="time-select-row">
                    <select id="start_hour" required>
                        {% for h in range(0, 24) %}
                            {% set hour = "%02d"|format(h) %}
                            <option value="{{ hour }}">{{ hour }}</option>
                        {% endfor %}
                    </select>

                    <span class="time-colon">:</span>

                    <select id="start_minute" required>
                        {% for m in range(0, 60) %}
                            {% set minute = "%02d"|format(m) %}
                            <option value="{{ minute }}">{{ minute }}</option>
                        {% endfor %}
                    </select>
                </div>

                <input 
                    type="hidden" 
                    id="session_time" 
                    name="session_time" 
                    value="00:00"
                >
            </div>

            <div class="form-group">
                <label>End Time</label>

                <div class="time-select-row">
                    <select id="end_hour" required>
                        {% for h in range(0, 24) %}
                            {% set hour = "%02d"|format(h) %}
                            <option value="{{ hour }}">{{ hour }}</option>
                        {% endfor %}
                    </select>

                    <span class="time-colon">:</span>

                    <select id="end_minute" required>
                        {% for m in range(0, 60) %}
                            {% set minute = "%02d"|format(m) %}
                            <option value="{{ minute }}">{{ minute }}</option>
                        {% endfor %}
                    </select>
                </div>

                <input 
                    type="hidden" 
                    id="end_time" 
                    name="end_time" 
                    value="00:00"
                >
            </div>

        </div>

        <div class="form-group">
            <label for="location_type">Session Type</label>
            <select 
                id="location_type" 
                name="location_type" 
                onchange="showLocationField()" 
                required
            >
                <option value="">Select session type</option>
                <option value="Physical">Physical</option>
                <option value="Online">Online</option>
            </select>
        </div>

        <div class="form-group" id="physical-box" style="display: none;">
            <label for="physical_location">Physical Location</label>
            <input 
                type="text" 
                id="physical_location" 
                name="physical_location" 
                placeholder="Example: MMU Library"
            >
        </div>

        <div class="form-group" id="online-box" style="display: none;">
            <label for="meeting_link">Meeting Link</label>
            <input 
                type="url" 
                id="meeting_link" 
                name="meeting_link" 
                placeholder="Example: https://meet.google.com/abc-defg"
            >
        </div>

        <div class="button-area">

            <button type="submit" class="create-btn">
                Create Session
            </button>

            <a href="{{ url_for('study_session_routes.sessions') }}" class="back-btn">
                Back
            </a>

        </div>

    </form>

</div>

<script>
    function combineTimeValues() {
        let startHour = document.getElementById("start_hour").value;
        let startMinute = document.getElementById("start_minute").value;
        let endHour = document.getElementById("end_hour").value;
        let endMinute = document.getElementById("end_minute").value;

        document.getElementById("session_time").value = startHour + ":" + startMinute;
        document.getElementById("end_time").value = endHour + ":" + endMinute;
    }

    function showLocationField() {
        let sessionType = document.getElementById("location_type").value;
        let physicalBox = document.getElementById("physical-box");
        let onlineBox = document.getElementById("online-box");
        let physicalInput = document.getElementById("physical_location");
        let onlineInput = document.getElementById("meeting_link");

        if (sessionType === "Physical") {
            physicalBox.style.display = "block";
            onlineBox.style.display = "none";
            physicalInput.required = true;
            onlineInput.required = false;
            onlineInput.value = "";
        } 
        else if (sessionType === "Online") {
            physicalBox.style.display = "none";
            onlineBox.style.display = "block";
            physicalInput.required = false;
            onlineInput.required = true;
            physicalInput.value = "";
        } 
        else {
            physicalBox.style.display = "none";
            onlineBox.style.display = "none";
            physicalInput.required = false;
            onlineInput.required = false;
            physicalInput.value = "";
            onlineInput.value = "";
        }
    }

    window.onload = function() {
        showLocationField();
        combineTimeValues();
    };
</script>

{% endblock %}
