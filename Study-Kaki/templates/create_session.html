<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <title>Create Study Session</title>
    <link rel="stylesheet" href="{{ url_for('static', filename='css/session_style.css') }}">
</head>

<body>

    <div class="top-header">
        <div class="logo-text">
            STUDY<span>KAKI</span>
        </div>
    </div>

    <div class="form-container">

        <h1>Create Study Session</h1>

        <form class="form-box" method="POST" action="{{ url_for('study_session_routes.create_session') }}">

            <label for="subject">Subject</label>
            <input type="text" id="subject" name="subject" placeholder="Example: Mathematics III" required>

            <label for="topic">Topic</label>
            <input type="text" id="topic" name="topic" placeholder="Example: Matrix Revision" required>

            <label for="session_date">Date</label>
            <input type="date" id="session_date" name="session_date" required>

            <label for="session_time">Start Time</label>
            <input type="time" id="session_time" name="session_time" required>

            <label for="end_time">End Time</label>
            <input type="time" id="end_time" name="end_time" required>

            <label for="location_type">Session Type</label>
            <select id="location_type" name="location_type" required>
                <option value="">Select session type</option>
                <option value="Physical">Physical</option>
                <option value="Online">Online</option>
            </select>

            <div id="physicalBox" class="location-box">
                <label for="physical_location">Physical Location</label>
                <input type="text" id="physical_location" name="physical_location" placeholder="Example: MMU Library">
            </div>

            <div id="onlineBox" class="location-box">
                <label for="meeting_link">Online Meeting Link</label>
                <input type="text" id="meeting_link" name="meeting_link" placeholder="Example: Google Meet link">
            </div>

            <div class="button-row">
                <button type="submit">Create Session</button>
                <a href="{{ url_for('study_session_routes.sessions') }}" class="btn btn-secondary">Back</a>
            </div>

        </form>

    </div>

    <script>
        const locationType = document.getElementById("location_type");
        const physicalBox = document.getElementById("physicalBox");
        const onlineBox = document.getElementById("onlineBox");
        const physicalInput = document.getElementById("physical_location");
        const onlineInput = document.getElementById("meeting_link");

        function showLocationField() {
            const selectedType = locationType.value;

            physicalBox.style.display = "none";
            onlineBox.style.display = "none";

            physicalInput.required = false;
            onlineInput.required = false;

            if (selectedType === "Physical") {
                physicalBox.style.display = "block";
                physicalInput.required = true;
            }

            if (selectedType === "Online") {
                onlineBox.style.display = "block";
                onlineInput.required = true;
            }
        }

        locationType.addEventListener("change", showLocationField);
        showLocationField();
    </script>

</body>
</html>
