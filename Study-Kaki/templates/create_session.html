<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <title>Create Study Session</title>

    <style>
        * {
            box-sizing: border-box;
        }

        body {
            margin: 0;
            font-family: Arial, sans-serif;
            min-height: 100vh;
            background-color: #ffffff;
            background-image: radial-gradient(#cbd5e1 1.5px, transparent 1.5px);
            background-size: 28px 28px;
            display: flex;
            justify-content: center;
            align-items: center;
            padding: 35px;
        }

        .form-card {
            width: 480px;
            background: white;
            padding: 38px;
            border: 3px solid #111;
            border-radius: 22px;
            box-shadow: 14px 14px 0 #111;
        }

        h1 {
            text-align: center;
            margin-top: 0;
            margin-bottom: 28px;
            color: #111;
            font-size: 28px;
        }

        label {
            display: block;
            font-weight: bold;
            margin-top: 15px;
            margin-bottom: 7px;
            color: #111;
        }

        input, select {
            width: 100%;
            padding: 13px 16px;
            border: 2px solid #111;
            border-radius: 15px;
            font-size: 15px;
            outline: none;
        }

        input:focus, select:focus {
            border-color: #2563eb;
        }

        .location-section {
            display: none;
        }

        .hint {
            font-size: 13px;
            color: #666;
            margin-top: 6px;
        }

        .submit-btn {
            width: 100%;
            margin-top: 28px;
            padding: 14px;
            border: 3px solid #111;
            border-radius: 16px;
            background: #c7d2fe;
            color: #111;
            font-size: 17px;
            font-weight: bold;
            cursor: pointer;
            box-shadow: 6px 6px 0 #111;
        }

        .submit-btn:hover {
            background: #a5b4fc;
        }

        .bottom-link {
            display: block;
            text-align: center;
            margin-top: 23px;
            color: #111;
            text-decoration: none;
            font-weight: bold;
        }

        .bottom-link:hover {
            color: #2563eb;
        }
    </style>
</head>

<body>

    <div class="form-card">
        <h1>Create Study Session</h1>

        <form action="{{ url_for('study_session_routes.create_session') }}" method="POST">

            <label>Subject</label>
            <input 
                type="text" 
                name="subject" 
                placeholder="Example: Mathematics III" 
                required
            >

            <label>Topic</label>
            <input 
                type="text" 
                name="topic" 
                placeholder="Example: Chapter 3 Tutorial Questions" 
                required
            >

            <label>Date</label>
            <input 
                type="date" 
                name="session_date" 
                required
            >

            <label>Start Time</label>
            <input 
                type="time" 
                name="session_time" 
                required
            >

            <label>End Time</label>
            <input 
                type="time" 
                name="end_time"
            >

            <label>Location Type</label>
            <select name="location_type" id="location_type" required onchange="showLocationInput()">
                <option value="">-- Select Location Type --</option>
                <option value="Physical">Physical</option>
                <option value="Online">Online</option>
            </select>

            <div id="physical_location_section" class="location-section">
                <label>Physical Location</label>
                <input 
                    type="text" 
                    name="physical_location" 
                    id="physical_location"
                    placeholder="Example: MMU Library / FCI Room"
                >
                <div class="hint">Only needed for physical session.</div>
            </div>

            <div id="meeting_link_section" class="location-section">
                <label>Meeting Link</label>
                <input 
                    type="text" 
                    name="meeting_link" 
                    id="meeting_link"
                    placeholder="Example: Google Meet / Zoom link"
                >
                <div class="hint">Only needed for online session.</div>
            </div>

            <button type="submit" class="submit-btn">Create Session</button>
        </form>

        <a href="{{ url_for('study_session_routes.sessions') }}" class="bottom-link">
            Back to Study Sessions
        </a>
    </div>

    <script>
        function showLocationInput() {
            const locationType = document.getElementById("location_type").value;

            const physicalSection = document.getElementById("physical_location_section");
            const meetingSection = document.getElementById("meeting_link_section");

            const physicalInput = document.getElementById("physical_location");
            const meetingInput = document.getElementById("meeting_link");

            if (locationType === "Physical") {
                physicalSection.style.display = "block";
                meetingSection.style.display = "none";

                physicalInput.required = true;
                meetingInput.required = false;
                meetingInput.value = "";
            } 
            else if (locationType === "Online") {
                physicalSection.style.display = "none";
                meetingSection.style.display = "block";

                physicalInput.required = false;
                meetingInput.required = true;
                physicalInput.value = "";
            } 
            else {
                physicalSection.style.display = "none";
                meetingSection.style.display = "none";

                physicalInput.required = false;
                meetingInput.required = false;
                physicalInput.value = "";
                meetingInput.value = "";
            }
        }
    </script>

</body>
</html>
