
{% extends "base.html" %}

{% block content %}
<!-- 这是一个简单的顶部状态条 -->
<header style="display: flex; justify-content: space-between; align-items: center; padding: 20px; max-width: 1100px; margin: 0 auto;">
    <div class="logo" style="font-weight: 800; font-size: 1.5rem;">StudyKaki</div>
    
    <!-- 🌟 这里就是你预留的 Profile 入口 -->
    <div class="user-controls" style="display: flex; align-items: center; gap: 15px;">
        <span style="font-weight: 600; color: #666;">Hi, TP06XXXX</span>
        <a href="{{ url_for('profile') }}" style="text-decoration: none;">
            <div style="width: 45px; height: 45px; background: #eee; border: 3px solid #111; border-radius: 50%; display: flex; justify-content: center; align-items: center; font-size: 1.2rem; cursor: pointer; transition: 0.2s;" 
                 onmouseover="this.style.transform='scale(1.1)'" 
                 onmouseout="this.style.transform='scale(1)'">
                👤
            </div>
        </a>
    </div>
</header>
<div class="bento-container">
    
    <!-- A. 欢迎区 -->
    <div class="bento-item welcome-card">
        <h1>Stop Debugging<br>Alone.</h1>
        <p>今天想和谁一起爆肝？</p>
    </div>

    <!-- B. 个人状态 -->
    <div class="bento-item stats-card">
        <span class="label">My Balance</span>
        <div class="coin-count">🪙 150</div>
        <div class="rank-tag">Bug Hunter</div>
    </div>

    <!-- C. 任务广场 (这个模块最宽最高) -->
    <div class="bento-item quest-board">
        <div class="board-header">
            <h3>任务广场</h3>
            <button class="mini-btn">发布求助 +</button>
        </div>
        <ul class="quest-list">
            <li><span>🔥</span> Python Assignment 2 求带</li>
            <li><span>💡</span> SQL 连表查询逻辑求教</li>
            <li><span>🕒</span> 寻找今晚图书馆刷题搭子</li>
        </ul>
    </div>

    <!-- D. 快速匹配 -->
    <div class="bento-item search-card">
        <input type="text" placeholder="寻找技术栈...">
        <button class="search-btn">GO</button>
    </div>

    <!-- E. 发现更多 (惊喜模块) -->
    <div class="bento-item discover-card">
        <p>发现</p>
        <div class="icon-grid">
            <span>📅</span>
            <span>📍</span>
            <span>💻</span>
        </div>
    </div>

</div>

<style>
    .bento-container {
        display: grid;
        grid-template-columns: repeat(3, 1fr); /* 三列布局 */
        grid-auto-rows: 200px; /* 每行基础高度 */
        gap: 20px;
        width: 100%;
        max-width: 1100px;
    }
    
    .bento-item {
        background: #fff;
        border: 3px solid #111;
        border-radius: 25px;
        padding: 25px;
        box-shadow: 8px 8px 0px #111; /* 典型的硬阴影风格 */
        transition: 0.2s;
    }

    /* 调整特定卡片的大小 */
    .welcome-card { grid-column: span 2; background: #c7d2fe; } /* 占据两列 */
    .quest-board { grid-row: span 2; grid-column: span 2; } /* 占据两列两行 */
    
    .bento-item:hover {
        transform: translate(-4px, -4px);
        box-shadow: 12px 12px 0px #111;
    }
</style>
{% endblock %}
