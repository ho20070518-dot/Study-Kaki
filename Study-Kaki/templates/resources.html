<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Resource Board</title>

<style>
*{
    box-sizing:border-box;
    margin:0;
    padding:0;
}

body{
    font-family:Arial, sans-serif;
    min-height:100vh;
    padding:40px 20px;

    background-color:#fdfaf6;
    background-image:
    linear-gradient(#e5e7eb 2px, transparent 2px), 
    linear-gradient(90deg, #e5e7eb 2px, transparent 2px);

    background-size:40px 40px;
}

.container{
    max-width:900px;
    margin:auto;
    background:white;
    padding:35px;
    border-radius:28px;
    border:3px solid #111;
    box-shadow:12px 12px 0px #111;
}

.navbar{
    background:#111;
    padding:16px 18px;
    border-radius:18px;
    margin-bottom:30px;
    box-shadow:4px 4px 0px #514d4d;
}

.navbar a{
    color:white;
    text-decoration:none;
    margin-right:18px;
    font-weight:700;
}

h1{
    margin-bottom:20px;
    color:#111;
}

form{
    display:flex;
    flex-direction:column;
    gap:12px;
    width:350px;
}

input, textarea{
    padding:14px;
    border:2px solid #111;
    border-radius:16px;
    background:#f8f9fa;
}

button{
    padding:14px;

    border:3px solid #111;
    border-radius:18px;

    background:#c7d2fe;

    font-weight:bold;
    font-size:15px;

    cursor:pointer;

    box-shadow:4px 4px 0px #111;

    transition:0.2s;
}

button:hover{
    transform:translate(2px,2px);
    box-shadow:2px 2px 0px #111;
}

.link-btn{
    margin-top:20px;
}
</style>
</head>

<body>

<div class="container">

    <div class="navbar">
        <a href="/resources">Upload Material</a>
        <a href="/resources-list">Browse Materials</a>
        <a href="/dashboard">Dashboard</a>
    </div>

    <h1>Study Materials</h1>

    <form action="/add-resource" method="post" enctype="multipart/form-data">

        <input type="text" name="title" placeholder="Title">

        <textarea name="description" placeholder="Description"></textarea>

        <input type="file" name="file">

        <button type="submit" style="background:#a7f3d0;">Add Resource</button>

    </form>

</div>

</body>
</html>
