<div style="
    font-family:Arial;
    min-height:100vh;
    animation: gradientBG 15s ease infinite;
    background: linear-gradient(-45deg, #ff9a9e, #a1c4fd, #c2ffd8, #fbc2eb);
    background-size: 400% 400%;
    overflow: auto;
">
    <div style="
        max-width:900px;
        margin:40px auto;
        padding:25px;
        background:rgba(255,255,255,0.75);
        border-radius:16px;
        box-shadow:0 10px 30px rgba(0,0,0,0.15);
        backdrop-filter: blur(8px);
    ">
        <!-- NAVBAR -->
        <div style="background:#2c3e50; padding:12px; margin-bottom:20px;">
            <a href="/resources" style="color:white; margin-right:10px; text-decoration:none;">Add Resource</a>
            <a href="/resources-list" style="color:white; margin-right:10px; text-decoration:none;">View Resources</a>
            <a href="/dashboard" style="color:white; text-decoration:none;">Dashboard</a>
        </div>

        <h1>Resource Board</h1>

        <!-- FORM -->
        <form action="/add-resource" method="post" style="display:flex; flex-direction:column; width:350px; gap:10px;">
            <input type="text" name="title" placeholder="Title" style="padding:10px; border:1px solid #ccc; border-radius:6px;">
            <textarea name="description" placeholder="Description" style="padding:10px; border:1px solid #ccc; border-radius:6px;"></textarea>
            <button type="submit" style="padding:10px; background:#2c3e50; color:white; border:none; border-radius:6px;">
                Submit
            </button>
        </form>

        <h1>Resources</h1>

        <a href="/resources-list">
            <button style="margin-top:10px; padding:8px 12px;">
                View Resources
            </button>
        </a>

    </div>
</div>

<style>
@keyframes gradientBG {
    0% { background-position: 0% 50%; }
    50% { background-position: 100% 50%; }
    100% { background-position: 0% 50%; }
}
</style>
