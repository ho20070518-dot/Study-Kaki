<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Resource Board</title>

<style>
*{
    box-sizing:border-box;
    margin:0;
    padding:0;
}

body{
    font-family:Arial, sans-serif;
    min-height:100vh;
    padding:40px 20px;

    background-color:#fdfaf6;
    background-image:radial-gradient(#d1d5db 2px, transparent 2px);
    background-size:30px 30px;
}

.container{
    max-width:900px;
    margin:auto;
    background:white;
    padding:35px;
    border-radius:28px;
    border:3px solid #111;
    box-shadow:12px 12px 0 #ebf4ff;
}

.navbar{
    background:#111;
    padding:14px;
    border-radius:16px;
    margin-bottom:30px;
}

.navbar a{
    color:white;
    text-decoration:none;
    margin-right:18px;
    font-weight:bold;
}

h1{
    margin-bottom:20px;
    color:#111;
}

form{
    display:flex;
    flex-direction:column;
    gap:12px;
    width:350px;
}

input, textarea{
    padding:14px;
    border:2px solid #111;
    border-radius:16px;
    background:#f8f9fa;
}

button{
    padding:14px;
    border:none;
    border-radius:16px;
    background:#c7d2fe;
    font-weight:bold;
    cursor:pointer;
}

button:hover{
    background:#a5b4fc;
}

.link-btn{
    margin-top:20px;
}
</style>
</head>

<body>

<div class="container">

    <div class="navbar">
        <a href="/resources">Add Resource</a>
        <a href="/resources-list">View Resources</a>
        <a href="/dashboard">Dashboard</a>
    </div>

    <h1>Resource Board</h1>

    <form action="/add-resource" method="post">

        <input type="text" name="title" placeholder="Title">

        <textarea name="description" placeholder="Description"></textarea>

        <button type="submit">Submit</button>

    </form>

</div>

</body>
</html>
