<div style="background:#2c3e50; padding:12px; margin-bottom:20px;">
    <a href="/resources" style="color:white; margin-right:10px;">Add Resource</a>
    <a href="/resources-list" style="color:white; margin-right:10px;">View Resources</a>
    <a href="/dashboard" style="color:white;">Dashboard</a>
</div>

<h1>Resource Board</h1>

<form action="/add-resource" method="post"
      style="display:flex; flex-direction:column; width:350px; gap:10px;">

    <input type="text" name="title" placeholder="Title"
           style="padding:10px; border:1px solid #ccc; border-radius:6px;">

    <textarea name="description" placeholder="Description"
              style="padding:10px; border:1px solid #ccc; border-radius:6px;"></textarea>

    <button type="submit"
            style="padding:10px; background:#2c3e50; color:white; border:none; border-radius:6px;">
        Submit
    </button>
</form>

<h1>Resources</h1>

<a href="/resources-list">
    <button>View Resources</button>
</a>
