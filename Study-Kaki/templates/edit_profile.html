{% extends "base.html" %}

{% block title %}Edit Profile - StudyKaki{% endblock %}

{% block content %}
    <link rel="stylesheet" href="{{ url_for('static', filename='css/edit_profile.css') }}">

    <div class="edit-container">
        
        <nav class="edit-nav">
            <a href="{{ url_for('profile') }}" class="btn-cancel">← CANCEL</a>
            <h1 class="edit-title">EDIT PROFILE</h1>
        </nav>

        <div class="edit-card">
            <form action="{{ url_for('edit_profile') }}" method="POST">
                
                <div class="form-group">
                    <label class="form-label">FULL NAME</label>
                    <input type="text" name="name" class="form-input" value="{{ user_data.name }}">
                </div>

                <div class="form-group">
                    <label class="form-label">STUDY GOALS / BIO</label>
                    <textarea name="bio" rows="3" class="form-input">{{ user_data.bio }}</textarea>
                </div>

                <div class="form-group">
                    <label class="form-label">TECH STACK (E.G. PYTHON, SQL, FLASK)</label>
                    <input type="text" name="tech_stack" class="form-input" value="{{ user_data.tech_stack or '' }}" placeholder="Python, SQL, Flask...">
                </div>

                <div class="form-row">
                    <div>
                        <label class="form-label">STATS</label>
                        <input type="text" name="stats" class="form-input" value="{{ user_data.stats }}" placeholder="Happy / Bad"> 
                    </div>
                    <div>
                        <label class="form-label">SPORTS & HOBBIES</label>
                        <input type="text" name="hobbies" class="form-input" value="{{ user_data.hobbies }}" placeholder="Basketball">
                    </div>
                </div>

                <button type="submit" class="btn-save">
                    SAVE CHANGES
                </button>
            </form>
        </div>
    </div>
{% endblock %}
