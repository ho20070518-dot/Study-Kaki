{% extends "base.html" %}

{% block title %}Edit Study Session - StudyKaki{% endblock %}

{% block content %}

<link rel="stylesheet" href="{{ url_for('static', filename='css/edit_session.css') }}">

<div class="edit-page">

    <div class="logo-text">
        STUDY<span>KAKI</span>
    </div>

    <hr class="top-line">

    <h1>Edit Study Session</h1>

    <form method="POST" action="{{ url_for('study_session_routes.edit_session', session_id=session.id) }}" class="edit-form">

        <div class="form-group">
            <label for="subject">Subject</label>
            <input 
                type="text" 
                id="subject" 
                name="subject" 
                value="{{ session.subject }}"
                required
            >
        </div>

        <div class="form-group">
            <label for="topic">Topic</label>
            <input 
                type="text" 
                id="topic" 
                name="topic" 
                value="{{ session.topic }}"
                required
            >
        </div>

        <div class="form-row">

            <div class="form-group">
                <label for="session_date">Date</label>
                <input 
                    type="date" 
                    id="session_date" 
                    name="session_date" 
                    value="{{ session.session_date }}"
                    required
                >
            </div>

            <div class="form-group">
                <label for="session_time">Start Time</label>
                <input 
                    type="time" 
                    id="session_time" 
                    name="session_time" 
                    value="{{ session.session_time }}"
                    required
                >
            </div>

            <div class="form-group">
                <label for="end_time">End Time</label>
                <input 
                    type="time" 
                    id="end_time" 
                    name="end_time" 
                    value="{{ session.end_time }}"
                    required
                >
            </div>

        </div>

        <div class="form-group">
            <label for="location_type">Session Type</label>
            <select 
                id="location_type" 
                name="location_type" 
                onchange="showLocationField()" 
                required
            >
                <option value="">Select session type</option>

                <option value="Physical" {% if session.location_type == "Physical" %}selected{% endif %}>
                    Physical
                </option>

                <option value="Online" {% if session.location_type == "Online" %}selected{% endif %}>
                    Online
                </option>
            </select>
        </div>

        <div class="form-group" id="physical-box">
            <label for="physical_location">Physical Location</label>
            <input 
                type="text" 
                id="physical_location" 
                name="physical_location" 
                value="{{ session.physical_location }}"
                placeholder="Example: MMU Library"
            >
        </div>

        <div class="form-group" id="online-box">
            <label for="meeting_link">Meeting Link</label>
            <input 
                type="url" 
                id="meeting_link" 
                name="meeting_link" 
                value="{{ session.meeting_link }}"
                placeholder="Example: https://meet.google.com/abc-defg"
            >
        </div>

        <div class="button-area">

            <button type="submit" class="update-btn">
                Update Session
            </button>

            <a href="{{ url_for('study_session_routes.sessions') }}" class="back-btn">
                Back
            </a>

        </div>

    </form>

</div>

<script>
    function showLocationField() {
        let sessionType = document.getElementById("location_type").value;
        let physicalBox = document.getElementById("physical-box");
        let onlineBox = document.getElementById("online-box");
        let physicalInput = document.getElementById("physical_location");
        let onlineInput = document.getElementById("meeting_link");

        if (sessionType === "Physical") {
            physicalBox.style.display = "block";
            onlineBox.style.display = "none";
            physicalInput.required = true;
            onlineInput.required = false;
        } 
        else if (sessionType === "Online") {
            physicalBox.style.display = "none";
            onlineBox.style.display = "block";
            physicalInput.required = false;
            onlineInput.required = true;
        } 
        else {
            physicalBox.style.display = "none";
            onlineBox.style.display = "none";
            physicalInput.required = false;
            onlineInput.required = false;
        }
    }

    window.onload = showLocationField;
</script>

{% endblock %}
