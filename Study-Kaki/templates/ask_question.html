<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<title>Ask Question</title>

<link href="https://fonts.googleapis.com/css2?family=Outfit:wght@400;600;700;800;900&display=swap" rel="stylesheet">

<link rel="stylesheet"
      href="{{ url_for('static', filename='css/resources.css') }}">

<link rel="stylesheet"
      href="{{ url_for('static', filename='css/qna.css') }}">

</head>

<body>

<nav style="
    display:flex;
    justify-content:space-between;
    align-items:center;
    padding:20px 40px;
    background:white;
    border-bottom:4px solid #111;
    width:100%;
">

    <div class="nav-left">

        <a href="{{ url_for('dashboard') }}"
           style="text-decoration:none;color:#111;">

            <h1 class="logo">
                STUDY<span style="color:#a7f3d0;">KAKI</span>
            </h1>

        </a>

    </div>

    <div class="nav-right"
         style="display:flex;align-items:center;gap:20px;">

        <span style="
            font-weight:700;
            color:#111;
            font-size:1.1rem;
        ">
            Hello, {{ session.get('user_id') }}
        </span>

        <a href="{{ url_for('profile') }}"
           style="text-decoration:none;">

            <div style="
                width:50px;
                height:50px;
                background:#c7d2fe;
                border:3px solid #111;
                border-radius:50%;
                display:flex;
                justify-content:center;
                align-items:center;
                font-size:1.5rem;
                box-shadow:4px 4px 0px #111;
            ">
                👤
            </div>

        </a>

    </div>

</nav>

<div class="container ask-question-container">

    <h1>Ask a Question</h1>

    <p class="subtitle">
        Select a study material topic and ask your question.
    </p>

    {% with messages = get_flashed_messages() %}
        {% if messages %}
            {% for message in messages %}

            <div class="flash-message">
                {{ message }}
            </div>

            {% endfor %}
        {% endif %}
    {% endwith %}

    <form action="{{ url_for('add_question') }}"
          method="POST"
          class="ask-question-form">

        <div class="form-group">

            <label>Subject</label>

            <select id="subjectSelect" required>

                <option value="" disabled selected>
                    Select Subject
                </option>

                {% for subject in subjects %}
                <option value="{{ subject['subject'] }}">
                    {{ subject['subject'] }}
                </option>
                {% endfor %}

            </select>

        </div>

        <div class="form-group">

            <label>Topic</label>

            <select
                name="resource_id"
                id="topicSelect"
                required>

                <option value="" disabled selected>
                    Select Topic
                </option>

            </select>

        </div>

        <div class="form-group">

            <label>Question Title</label>

            <input
                type="text"
                name="title"
                placeholder="Enter question title (Set 1, Grammar, Vectors)"
                required>

        </div>

        <div class="form-group">

            <label>Question Details</label>

            <textarea
                name="content"
                placeholder="Describe your question... (How to solve the question 14)"
                required></textarea>

        </div>

        <div class="button-group">

            <button
                type="submit"
                class="update-btn">
                Post Question
            </button>

            <a href="{{ url_for('questions') }}"
               class="cancel-btn">
                Cancel
            </a>

        </div>

    </form>

</div>

<script>

const subjectSelect =
document.getElementById("subjectSelect");

const topicSelect =
document.getElementById("topicSelect");

subjectSelect.addEventListener("change", function() {

    const subject = this.value;

    topicSelect.innerHTML =
        '<option value="">Loading...</option>';

    fetch("/get-topics/" + encodeURIComponent(subject))

    .then(response => response.json())

    .then(data => {

        topicSelect.innerHTML =
            '<option value="">Select Topic</option>';

        data.forEach(topic => {

            topicSelect.innerHTML += `
                <option value="${topic.id}">
                    ${topic.title}
                </option>
            `;

        });

    })

    .catch(error => {

        console.error(error);

        topicSelect.innerHTML =
            '<option value="">No Topics Found</option>';

    });

});

</script>

</body>
</html>
