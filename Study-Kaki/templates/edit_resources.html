<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<title>Edit Study Material</title>

<link href="https://fonts.googleapis.com/css2?family=Outfit:wght@400;600;700&display=swap" rel="stylesheet">

<style>

*{
    box-sizing:border-box;
    margin:0;
    padding:0;
}

body{
    font-family:'Outfit', sans-serif;

    min-height:100vh;
    margin:0;
    padding:0;

    background-color:#fafaf9;

    background-image:
        linear-gradient(#e5e7eb 2px, transparent 2px),
        linear-gradient(90deg, #e5e7eb 2px, transparent 2px);

    background-size:40px 40px;
}

.container{
    max-width:750px;
    margin:40px auto;

    background:white;

    padding:40px;

    border-radius:30px;

    border:3px solid #111;

    box-shadow:12px 12px 0px #111;
}

.top-bar{
    display:flex;
    justify-content:space-between;
    align-items:center;

    margin-bottom:30px;
    padding-bottom:15px;

    border-bottom:3px solid #111;
}

.top-bar h1{
    font-size:30px;
    color:#111;
}

.back-btn{
    text-decoration:none;

    background:#c7d2fe;
    color:#111;

    padding:10px 16px;

    border:2px solid #111;
    border-radius:14px;

    font-weight:700;

    box-shadow:3px 3px 0px #111;

    transition:0.2s;
}

.back-btn:hover{
    transform:translate(2px,2px);
    box-shadow:1px 1px 0px #111;
}

.subtitle{
    margin-bottom:25px;
    color:#555;
    font-weight:500;
}

form{
    display:flex;
    flex-direction:column;
    gap:20px;
}

label{
    font-weight:700;
    margin-bottom:8px;
    display:block;
    color:#111;
}

input,
textarea{
    width:100%;

    padding:16px;

    border:2px solid #111;
    border-radius:18px;

    background:#f8fafc;

    font-size:15px;
    font-family:inherit;

    transition:0.2s;
}

input:focus,
textarea:focus{
    outline:none;

    background:white;

    transform:translate(-2px,-2px);

    box-shadow:
        4px 4px 0px #dbeafe,
        4px 4px 0px 2px #111;
}

textarea{
    min-height:160px;
    resize:vertical;
}

.button-group{
    display:flex;
    gap:15px;

    margin-top:10px;
}

.update-btn{
    flex:1;

    padding:15px;

    background:#a7f3d0;

    border:3px solid #111;
    border-radius:18px;

    font-weight:700;
    font-size:15px;

    cursor:pointer;

    box-shadow:4px 4px 0px #111;

    transition:0.2s;
}

.update-btn:hover{
    background:#6ee7b7;

    transform:translate(2px,2px);

    box-shadow:2px 2px 0px #111;
}

.cancel-btn{
    flex:1;

    text-align:center;
    text-decoration:none;

    padding:15px;

    background:#f3f4f6;
    color:#111;

    border:3px solid #111;
    border-radius:18px;

    font-weight:700;

    box-shadow:4px 4px 0px #111;

    transition:0.2s;
}

.cancel-btn:hover{
    transform:translate(2px,2px);

    box-shadow:2px 2px 0px #111;
}

</style>
</head>

<body>

<nav style="
    display:flex;
    justify-content:space-between;
    align-items:center;
    padding:20px 40px;
    background:white;
    border-bottom:4px solid #111;
    width:100%;
">

    <div class="nav-left">

        <a href="{{ url_for('dashboard') }}"
           style="text-decoration:none;color:#111;">

            <h1 style="
                font-size:1.8rem;
                font-weight:900;
                margin:0;
            ">
                STUDY<span style="color:#a7f3d0;">KAKI</span>
            </h1>

        </a>

    </div>

    <div class="nav-right"
         style="display:flex;align-items:center;gap:20px;">

        <span style="
            font-weight:700;
            color:#111;
            font-size:1.1rem;
        ">
            Hello, {{ session.get('user_id') }}
        </span>

        <a href="{{ url_for('profile') }}"
           style="text-decoration:none;">

            <div style="
                width:50px;
                height:50px;
                background:#c7d2fe;
                border:3px solid #111;
                border-radius:50%;
                display:flex;
                justify-content:center;
                align-items:center;
                font-size:1.5rem;
                box-shadow:4px 4px 0px #111;
            ">
                👤
            </div>

        </a>

    </div>

</nav>    

<div class="container" style="margin-top:30px;">

    <div class="top-bar">

        <h1>Edit Study Material</h1>

    </div>

    <p class="subtitle">
        Update your study material information below.
    </p>

    {% with messages = get_flashed_messages() %}
        {% if messages %}
            {% for message in messages %}
                <div style="
                    background:#fee2e2;
                    color:#991b1b;
                    padding:12px;
                    border-radius:12px;
                    margin-bottom:15px;
                    border:2px solid #111;
                    font-weight:bold;
                ">
                    {{ message }}
                </div>
            {% endfor %}
        {% endif %}
    {% endwith %}

    <form method="POST" action="/update-resource/{{ resource[0] }}">

        <div>
            <label>Title</label>

            <input
                type="text"
                name="title"
                value="{{ resource[1] }}"
                required
            >
        </div>

        <div>
            <label>Description</label>

            <textarea
                name="description"
                required
            >{{ resource[2] }}</textarea>
        </div>

        <div class="button-group">

            <button type="submit" class="update-btn">
                Update Material
            </button>

            <a href="/resources-list" class="cancel-btn">
                Cancel
            </a>

        </div>

    </form>

</div>

</body>
</html>
